name: Build Weather Tracker
on:
  push:
    paths:
      - 'weather-tracker/**'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build and push
        run: |
          docker build -t ghcr.io/${{ github.actor }}/ds5220-weather:latest ./weather-tracker
          docker push ghcr.io/${{ github.actor }}/ds5220-weather:latest
